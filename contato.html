<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/bomba.css" />
    <script src="./js/bomba.js"></script>
    <title>Contato - Hidráulica Pro Brasil</title>
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="./img/Windows.png" alt="logo" />
      </div>
      <nav class="selecao">
        <div class="home"><a href="./home.html">Home</a></div>
        <div class="sobre"><a href="./sobre.html">Sobre</a></div>
        <div class="contato"><a href="./contato.html">Contato</a></div>
        <div class="login"><a href="./login.html">Login</a></div>
      </nav>
    </header>

    <main>
      <div class="card">
        <h2>Fale Conosco</h2>

        <div class="campo">
          <input type="text" placeholder="Seu Nome" />
        </div>
        <div class="campo">
          <input type="email" placeholder="Seu Email" />
        </div>
        <div class="campo">
          <textarea placeholder="Como podemos ajudar?"></textarea>
        </div>

        <button onclick="enviarMensagem()" class="btn-enviar">
          Enviar Mensagem
        </button>
      </div>
    </main>

    <footer>
      <p>2026 Hidráulica Pro Brasil - Todos os direitos reservados.</p>
    </footer>
  </body>
</html>
