<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/bomba.css" />
    <script src="./js/bomba.js"></script>
    <title>Login - Hidráulica Pro Brasil</title>
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="./img/Windows.png" alt="logo" />
      </div>
      <nav class="selecao">
        <div class="home"><a href="./home.html">Home</a></div>
        <div class="sobre"><a href="./sobre.html">Sobre</a></div>
        <div class="contato"><a href="./contato.html">Contato</a></div>
      </nav>
    </header>

    <main>
      <div class="card">
        <div class="logon">
          <img src="./img/Windows.png" alt="logo" />
        </div>
        <div class="title">
          <h1>Login</h1>
        </div>
        <div class="campo">
          <input type="email" placeholder="Digite seu E-mail" />
        </div>
        <div class="campo">
          <input type="text" placeholder="Digite sua senha" />
        </div>
        <button onclick="acessar()" class="btn-enviar">Acessar</button>
        <p id="mensagem-login" class="mensagem-login"></p>
      </div>
    </main>

    <footer>
      <p>2026 Hidráulica Pro Brasil - Todos os direitos reservados.</p>
    </footer>
  </body>
</html>
